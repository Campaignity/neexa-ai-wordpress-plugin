name: Release

# Build the production plugin zip and publish it as a GitHub Release
# whenever a SemVer tag (e.g. 2.1.3) is pushed.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production zip
        run: bash build-zip.sh prod

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ github.ref_name }}
          files: neexa-ai-*-prod.zip
          generate_release_notes: true
